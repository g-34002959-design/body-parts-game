<button onclick="startGame()">Start Game</button>
<h2 id="question"></h2>
<div id="choices"></div>
<p id="result"></p>
<p id="score">Score: 0</p>

<script>
const parts=["head","hand","shoulder","elbow","leg","foot","knee","finger"];
let answer="";
let score=0;

function speak(text){
 const msg=new SpeechSynthesisUtterance(text);
 msg.lang="en-US";
 speechSynthesis.speak(msg);
}

function shuffle(arr){
 return arr.sort(()=>Math.random()-0.5);
}

function nextQuestion(){
 answer=parts[Math.floor(Math.random()*parts.length)];
 document.getElementById("question").innerHTML="Touch the: "+answer.toUpperCase();
 speak("Touch the " + answer);

 let options=[answer];
 while(options.length<4){
   let p=parts[Math.floor(Math.random()*parts.length)];
   if(!options.includes(p)) options.push(p);
 }
 options=shuffle(options);

 let html="";
 options.forEach(o=>{
   html += `<button onclick="checkAnswer('${o}')">${o}</button>`;
 });
 document.getElementById("choices").innerHTML=html;
}

function checkAnswer(choice){
 if(choice===answer){
   score++;
   document.getElementById("result").innerHTML="Correct!";
   document.getElementById("score").innerHTML="Score: "+score;
   speak("Excellent");
 } else {
   document.getElementById("result").innerHTML="Try Again";
   speak("Try again");
 }
 setTimeout(nextQuestion,1500);
}

function startGame(){
 score=0;
 document.getElementById("score").innerHTML="Score: 0";
 nextQuestion();
}
</script>
